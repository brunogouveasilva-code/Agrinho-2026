<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulador de Energia Solar Rural</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="overlay"></div>

  <main class="container">
    <h1>☀ Simulador de Energia Solar Rural</h1>

    <div class="card">
      <label>Consumo mensal (kWh)</label>
      <input type="number" id="consumo" placeholder="Ex: 1200">

      <label>Valor da conta mensal (R$)</label>
      <input type="number" id="conta" placeholder="Ex: 950">

      <label>Quantidade de placas solares</label>
      <input type="number" id="placas" placeholder="Ex: 20">

      <button onclick="calcularEconomia()">
        Calcular Economia
      </button>

      <div class="resultado" id="resultado"></div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
